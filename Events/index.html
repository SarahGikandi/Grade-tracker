<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <form id="studentForm">
        <h2>Smart Student Registration</h2>

        <label>
            <input type="text" id="Fullname" placeholder="enter your Fullname" required> <br>
            <small id="nameHelper" class="Helper"></small><br>
            <small id="nameCounter" class="counter"></small>
        </label>
        <label>
            <input type="email" id="email" placeholder="enter your Email" required><br>
            <small id="emailHelper" class="Helper"></small>

        </label>
        <label>
            <input type="text" id="course" placeholder="enter your Course" required><br>
            <small id="courseHelper" class="Helper"></small> <br>

        </label>
        <button id="submit-btn" type="submit">Submit button</button>
    </form>

    <div id="message"></div>

    <script src="script.js"></script>
</body>
</html>
